  <line x1="80" y1="96" x2="100" y2="96" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="100" y1="96" x2="100" y2="116" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="100" y1="116" x2="120" y2="116" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- 3×3 grid of hollow circles -->
  <circle cx="80"  cy="76"  r="7" stroke="white" stroke-width="5.5"/>
  <circle cx="100" cy="76"  r="7" stroke="white" stroke-width="5.5"/>
  <circle cx="120" cy="76"  r="7" stroke="white" stroke-width="5.5"/>
  <circle cx="80"  cy="96"  r="7" stroke="white" stroke-width="5.5"/>
  <circle cx="100" cy="96"  r="7" stroke="white" stroke-width="5.5"/>
  <circle cx="120" cy="96"  r="7" stroke="white" stroke-width="5.5"/>
  <circle cx="80"  cy="116" r="7" stroke="white" stroke-width="5.5"/>
  <circle cx="100" cy="116" r="7" stroke="white" stroke-width="5.5"/>
  <circle cx="120" cy="116" r="7" stroke="white" stroke-width="5.5"/>
</svg>
