    M100,14
    C148,12 180,48 180,92
    C180,134 162,163 146,174
    L146,196
    L164,196
    L164,218
    L66,218
    L66,202
    L50,202
    L50,182
    L32,182
    L32,168
    C34,152 38,130 40,112
    C44,88 52,62 64,46
    C74,30 86,15 100,14
