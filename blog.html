<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Mindful Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: 'Inter', sans-serif; margin: 0; }
    .font-display { font-family: 'Cormorant Garamond', serif; }
    .brand { color: #E8621A; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; transition: color 0.2s; }
    nav a:hover { color: #fff; }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(232,98,26,0.3);
      box-shadow: 0 12px 40px rgba(232,98,26,0.12);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #E8621A;
      background: rgba(232,98,26,0.1);
      border: 1px solid rgba(232,98,26,0.2);
      border-radius: 20px;
      padding: 4px 12px;
    }
    #loading { text-align: center; color: #666; padding: 80px 0; font-size: 15px; }
    #empty { text-align: center; color: #555; padding: 80px 0; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav style="border-bottom: 1px solid #1e1e1e; padding: 20px 0; position: sticky; top: 0; background: rgba(17,17,17,0.95); backdrop-filter: blur(12px); z-index: 100;">
    <div style="max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between;">
      <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <img src="/brand_assets/logo.svg" alt="Mindful Academy Logo" style="height:36px;width:auto;" />
        <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.02em;">Mindful Academy</span>
      </a>
      <div style="display:flex; align-items:center; gap:32px;">
        <a href="/">Home</a>
        <a href="/blog.html" style="color:#fff;">Blog</a>
        <a href="/#contact" style="background:#E8621A; color:#fff; padding:8px 20px; border-radius:8px; font-size:13px; font-weight:600;">Apply →</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <div style="padding: 80px 24px 56px; text-align: center; max-width: 700px; margin: 0 auto;">
    <p style="font-size:11px; text-transform:uppercase; letter-spacing:0.14em; font-weight:600; color:#E8621A; margin-bottom:16px;">Mindful Academy</p>
    <h1 class="font-display" style="font-size: clamp(2.8rem, 6vw, 4.5rem); font-weight:700; line-height:1.05; letter-spacing:-0.03em; color:#fff; margin-bottom:20px;">
      Insights on Peak<br>Performance
    </h1>
    <p style="color:#888; font-size:1.05rem; line-height:1.75;">
      Perspectives on cognitive performance, leadership, and the science of peak states.
    </p>
  </div>

  <!-- POSTS GRID -->
  <div style="max-width: 1200px; margin: 0 auto; padding: 0 24px 120px;">
    <div id="loading">Loading posts…</div>
    <div id="empty" style="display:none;">
      <p class="font-display" style="font-size:1.8rem; color:#444; margin-bottom:12px;">No posts yet.</p>
      <p style="color:#555; font-size:14px;">Check back soon — insights are on the way.</p>
    </div>
    <div id="grid" style="display:none; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px;"></div>
  </div>

  <!-- FOOTER -->
  <footer style="border-top:1px solid #1e1e1e; padding:40px 24px; text-align:center;">
    <p style="color:#444; font-size:13px;">© 2026 Mindful Academy. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // ── CONFIG ── update REPO if your GitHub repo path changes
    const REPO = 'sumeet91/mindfulacademy';
    const BRANCH = 'main';
    const API = `https://api.github.com/repos/${REPO}/contents/_posts?ref=${BRANCH}`;

    function parseFrontmatter(raw) {
      const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---/);
      if (!match) return { body: raw, meta: {} };
      const fm = match[1];
      const body = raw.slice(match[0].length).trim();
      const meta = {};
      fm.split('\n').forEach(line => {
        const i = line.indexOf(':');
        if (i === -1) return;
        const key = line.slice(0, i).trim();
        let val = line.slice(i + 1).trim().replace(/^["']|["']$/g, '');
        meta[key] = val;
      });
      return { meta, body };
    }

    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str);
      return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    }

    async function loadPosts() {
      const loading = document.getElementById('loading');
      const grid    = document.getElementById('grid');
      const empty   = document.getElementById('empty');

      try {
        const res   = await fetch(API);
        const files = await res.json();
        if (!Array.isArray(files) || files.length === 0) {
          loading.style.display = 'none';
          empty.style.display   = 'block';
          return;
        }

        const mdFiles = files.filter(f => f.name.endsWith('.md')).reverse();
        if (mdFiles.length === 0) {
          loading.style.display = 'none';
          empty.style.display   = 'block';
          return;
        }

        const posts = await Promise.all(mdFiles.map(async f => {
          const r    = await fetch(f.download_url);
          const text = await r.text();
          const { meta } = parseFrontmatter(text);
          return { ...meta, slug: f.name.replace(/\.md$/, '') };
        }));

        posts.sort((a, b) => new Date(b.date) - new Date(a.date));

        loading.style.display = 'none';
        grid.style.display    = 'grid';

        posts.forEach(post => {
          const card = document.createElement('a');
          card.className = 'card';
          card.href = `/blog-post.html?post=${post.slug}`;
          card.innerHTML = `
            ${post.image
              ? `<img class="card-img" src="${post.image}" alt="${post.title}" loading="lazy" />`
              : `<div class="card-img-placeholder">
                   <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5">
                     <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
                   </svg>
                 </div>`
            }
            <div style="padding: 24px;">
              <span class="tag">Insights</span>
              <h2 class="font-display" style="font-size:1.45rem; font-weight:700; color:#fff; line-height:1.2; margin:12px 0 10px; letter-spacing:-0.02em;">
                ${post.title || 'Untitled'}
              </h2>
              <p style="color:#888; font-size:14px; line-height:1.65; margin-bottom:20px; display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">
                ${post.excerpt || ''}
              </p>
              <div style="display:flex; align-items:center; justify-content:space-between;">
                <span style="font-size:12px; color:#555;">${formatDate(post.date)}</span>
                <span style="font-size:13px; color:#E8621A; font-weight:500;">Read more →</span>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

      } catch (err) {
        loading.innerHTML = '<p style="color:#555;">Could not load posts. Please try again later.</p>';
        console.error(err);
      }
    }

    loadPosts();

    // Netlify Identity redirect
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => { document.location.href = '/admin/'; });
        }
      });
    }
  </script>
</body>
</html>
